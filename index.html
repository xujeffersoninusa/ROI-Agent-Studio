<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ROI Agent Studio v7→v8 Patcher</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:#0f1320;color:#e8edf8;margin:0;padding:40px;min-height:100vh;}
h1{font-size:24px;}
.box{background:#161c2e;border:1px solid #2a3350;border-radius:14px;padding:24px;margin:16px 0;max-width:800px;}
label{display:block;margin-bottom:8px;font-weight:600;color:#60a5fa;}
input[type=file]{margin:8px 0 16px;color:#e8edf8;}
button{background:#60a5fa;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-weight:700;font-size:14px;cursor:pointer;}
button:hover{background:#3b82f6;}
button:disabled{opacity:.5;cursor:not-allowed;}
.log{background:#0a0d1c;border:1px solid #2a3350;border-radius:8px;padding:12px;font-family:monospace;font-size:12px;max-height:300px;overflow-y:auto;margin-top:16px;color:#34d399;white-space:pre-wrap;}
.ok{color:#34d399;} .err{color:#f87171;} .warn{color:#fbbf24;}
</style>
</head>
<body>
<h1>🔧 ROI Agent Studio — v7 → v8 Patcher</h1>
<div class="box">
  <label>1. Select your <code>ROI_Agent_Studio_v7.html</code> file:</label>
  <input type="file" id="fileIn" accept=".html,.htm"/>
  <br/>
  <button id="goBtn" onclick="runPatch()" disabled>2. Apply Hub Manager Patches & Download v8</button>
  <div class="log" id="log"></div>
</div>

<script>
var fileContent='';
document.getElementById('fileIn').addEventListener('change',function(e){
  var f=e.target.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    fileContent=ev.target.result;
    log('✅ Loaded: '+f.name+' ('+fileContent.length+' chars)','ok');
    document.getElementById('goBtn').disabled=false;
  };
  reader.readAsText(f);
});

function log(msg,cls){
  var el=document.getElementById('log');
  el.innerHTML+='<span class="'+(cls||'')+'">'+ msg+'</span>\n';
  el.scrollTop=el.scrollHeight;
}

function runPatch(){
  if(!fileContent){log('No file loaded!','err');return;}
  var s=fileContent;
  var patches=0;

  // ═══════════════════════════════════════════════════════
  // PATCH 1: Insert new CSS before the LAST </style> tag
  // ═══════════════════════════════════════════════════════
  var newCSS = `
/* ── Hub Manager v8 — Active / Archived Layout ── */
.hm-stats{color:var(--muted);font-size:12px;}
.hm-section-label{display:flex;align-items:center;gap:8px;margin:24px 0 14px;font-size:16px;font-weight:800;}
.hm-section-label.active-lbl{color:var(--green);}
.hm-section-label.archived-lbl{color:var(--amber);}
.hm-dot{width:12px;height:12px;border-radius:50%;display:inline-block;flex-shrink:0;}
.hm-dot.green{background:var(--green);}
.hm-dot.amber{background:var(--amber);}
.hub-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;}
.hub-badge.badge-active{background:var(--green-s);color:var(--green);border:1px solid rgba(52,211,153,.3);}
.hub-badge.badge-archived{background:var(--amber-s);color:var(--amber);border:1px solid rgba(251,191,36,.3);}
.hub-offline{display:inline-flex;align-items:center;gap:4px;color:var(--muted);font-size:11px;margin-bottom:8px;}
.btn-archive{background:rgba(194,65,12,.9);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-weight:700;font-size:11px;cursor:pointer;transition:all .15s;}
.btn-archive:hover{background:#ea580c;box-shadow:0 0 8px rgba(194,65,12,.3);}
.btn-resume{background:rgba(29,78,216,.9);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-weight:700;font-size:11px;cursor:pointer;transition:all .15s;}
.btn-resume:hover{background:#2563eb;box-shadow:0 0 8px rgba(29,78,216,.3);}
.btn-delete-full{background:rgba(220,38,38,.9);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-weight:700;font-size:11px;cursor:pointer;transition:all .15s;}
.btn-delete-full:hover{background:#ef4444;box-shadow:0 0 8px rgba(220,38,38,.3);}
.btn-disabled{opacity:.5;pointer-events:none;cursor:not-allowed;}
.hm-empty{color:var(--muted);font-size:13px;padding:14px 0;font-style:italic;}
.del-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:20px;}
.del-modal-overlay.show{display:flex;}
.del-modal{background:var(--surface);border:1px solid var(--line);border-radius:16px;max-width:500px;width:92%;padding:28px;box-shadow:0 8px 40px rgba(0,0,0,.5);}
.del-modal h3{color:var(--red);font-size:16px;font-weight:800;margin:0 0 12px;}
.del-modal-body{color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:22px;}
.del-modal-body strong{color:var(--ink);}
.del-modal-body code{color:var(--green);font-size:11px;background:var(--surface2);padding:2px 6px;border-radius:4px;}
.del-modal-actions{display:flex;justify-content:flex-end;gap:10px;}
`;

  // Find the FIRST </style> that's followed by </head> (the main stylesheet)
  var styleEnd = s.indexOf('</style>');
  if(styleEnd>0){
    // Find all </style> occurrences; we want the one in the <head> (not inside the template)
    // The first </style> in head is the main one
    s = s.substring(0, styleEnd) + newCSS + s.substring(styleEnd);
    patches++;
    log('PATCH 1 ✅ New Hub Manager CSS inserted ('+newCSS.split('\n').length+' lines)','ok');
  } else {
    log('PATCH 1 ❌ Could not find </style> tag','err');
  }

  // ═══════════════════════════════════════════════════════
  // PATCH 2: Replace hubManagerShell HTML
  // ═══════════════════════════════════════════════════════
  var hmStart = s.indexOf('<div class="shell" id="hubManagerShell"');
  if(hmStart<0) hmStart = s.indexOf("<div class='shell' id='hubManagerShell'");
  if(hmStart<0) hmStart = s.indexOf('id="hubManagerShell"');
  
  if(hmStart>0){
    // Find the shell div start, then find its closing tag
    // The hubManagerShell is a sibling of studioShell, so find the next </div> at depth 0
    var searchFrom = hmStart;
    // Go back to the actual <div start if we matched on id=
    if(s.substring(hmStart-30,hmStart).indexOf('<div')>=0){
      hmStart = s.lastIndexOf('<div', hmStart);
    }
    
    // Count nested divs to find the matching </div>
    var depth=0; var i=hmStart; var found=false;
    while(i<s.length){
      if(s.substring(i,i+4)==='<div'){depth++;i+=4;}
      else if(s.substring(i,i+6)==='</div>'){
        depth--;
        if(depth===0){
          var hmEnd=i+6;
          found=true;
          break;
        }
        i+=6;
      } else {i++;}
    }
    
    if(found){
      var newHubManagerHTML = `<!-- Delete Confirmation Modal -->
<div class="del-modal-overlay" id="delModal">
  <div class="del-modal">
    <h3>&#x26A0;&#xFE0F; Permanently Delete Hub</h3>
    <div class="del-modal-body" id="delModalBody"></div>
    <div class="del-modal-actions">
      <button class="btn-ghost" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-delete-full" id="delConfirmBtn" onclick="confirmDeleteHub()">&#x1F5D1;&#xFE0F; Delete Forever</button>
    </div>
  </div>
</div>
<div class="shell" id="hubManagerShell" style="display:none;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:12px;">
    <h2 style="margin:0;font-size:20px;">&#x1F6E0;&#xFE0F; Hub Manager</h2>
    <div class="hm-stats" id="hmStats"></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
    <input id="hubSearchInput" type="text" placeholder="&#x1F50D; Filter hubs…" oninput="filterHubs()" style="padding:8px 12px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:12px;width:200px;"/>
    <button class="btn-ghost" onclick="loadHubGrid()">&#x1F504; Refresh</button>
    <button class="btn-primary" onclick="hideHubManager()">+ Create New</button>
  </div>
  <div class="hm-section-label active-lbl"><span class="hm-dot green"></span> Active Hubs</div>
  <div class="hub-grid" id="activeHubGrid"></div>
  <div class="hm-section-label archived-lbl"><span class="hm-dot amber"></span> Archived Hubs</div>
  <div class="hub-grid" id="archivedHubGrid"></div>
</div>`;
      s = s.substring(0, hmStart) + newHubManagerHTML + s.substring(hmEnd);
      patches++;
      log('PATCH 2 ✅ Hub Manager HTML replaced with Active/Archived layout + delete modal','ok');
    } else {
      log('PATCH 2 ❌ Could not find closing </div> for hubManagerShell','err');
    }
  } else {
    log('PATCH 2 ❌ Could not find hubManagerShell div','err');
  }

  // ═══════════════════════════════════════════════════════
  // PATCH 3: In loadHubGrid, replace renderHubCards → renderHubManager
  // ═══════════════════════════════════════════════════════
  var rcCount = 0;
  while(s.indexOf('renderHubCards(')>=0){
    s = s.replace('renderHubCards(', 'renderHubManager(');
    rcCount++;
  }
  if(rcCount>0){
    patches++;
    log('PATCH 3 ✅ Replaced '+rcCount+' occurrence(s) of renderHubCards → renderHubManager','ok');
  } else {
    log('PATCH 3 ⚠️ renderHubCards not found (may already be patched)','warn');
  }

  // PATCH 4: Replace Hub Manager JS functions
  // ═══════════════════════════════════════════════════════
  // Find "function renderHubCards" or "function renderHubManager" (if patch 3 already renamed)
  var fnStart = s.indexOf('function renderHubManager(hubs)');
  if(fnStart<0) fnStart = s.indexOf('function renderHubCards(hubs)');
  
  // Find the end marker: "document.addEventListener('DOMContentLoaded'"
  var fnEnd = s.indexOf("document.addEventListener('DOMContentLoaded'");
  if(fnEnd<0) fnEnd = s.indexOf('document.addEventListener("DOMContentLoaded"');
  
  if(fnStart>0 && fnEnd>fnStart){
    var newFunctions = `function renderHubManager(hubs){
  var active=hubs.filter(function(h){return (h.status||'live')==='live';});
  var archived=hubs.filter(function(h){return h.status==='archived';});
  var statsEl=document.getElementById('hmStats');
  if(statsEl) statsEl.textContent=active.length+' active \\u2022 '+archived.length+' archived \\u2022 '+hubs.length+' total';
  var ag=document.getElementById('activeHubGrid');
  if(ag){
    if(active.length===0){ag.innerHTML='<div class="hm-empty">No active hubs. Click <b>+ Create New</b> to get started.</div>';}
    else{ag.innerHTML=active.map(function(h){return buildActiveCard(h);}).join('');}
  }
  var rg=document.getElementById('archivedHubGrid');
  if(rg){
    if(archived.length===0){rg.innerHTML='<div class="hm-empty">No archived hubs.</div>';}
    else{rg.innerHTML=archived.map(function(h){return buildArchivedCard(h);}).join('');}
  }
  updateHubCount();
}

  c+='<span class="hub-badge badge-active">Active</span></div>';

  c+='<span>\\uD83D\\uDCE6 '+esc(h.product_code||'\\u2014')+'</span>';

  c+='<span>\\uD83D\\uDCC5 '+dt+'</span>';
  if(h.db_table) c+='<span>\\uD83D\\uDDC4 <code style="color:var(--green);font-size:10px;">'+esc(h.db_table)+'</code></span>';
  c+='</div><div class="hc-actions">';
  if(h.hub_url) c+='<a class="btn-primary" href="'+esc(h.hub_url)+'" target="_blank" style="text-decoration:none;font-size:11px;padding:6px 12px;">\\uD83D\\uDD17 Open</a>';
  if(h.hub_url) c+='<button class="btn-ghost" style="font-size:11px;padding:6px 12px;" onclick="copyHubUrl(\\''+esc(h.hub_url)+'\\')" >\\uD83D\\uDCCB Copy URL</button>';
  c+='<button class="btn-archive" onclick="archiveHub(\\''+hid+'\\',\\''+hname.replace(/'/g,"\\\\'")+'\\')" >\\uD83D\\uDCC1 Archive</button>';
  c+='</div></div>';
  return c;
}

function buildArchivedCard(h){
  var hid=esc(h.hub_id||'');var hname=esc(h.hub_name||h.hub_id||'Untitled');
  var dt=h.created_at?new Date(h.created_at).toLocaleDateString():'\\u2014';
  var c='<div class="hub-card">';
  c+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
  c+='<h3 style="margin:0;font-size:15px;font-weight:800;">'+hname+'</h3>';
  c+='<span class="hub-badge badge-archived">Archived</span></div>';

  c+='<span>\\uD83D\\uDC64 '+esc(h.owner||'\\u2014')+'</span>';
  c+='<span>\\uD83D\\uDCC5 '+dt+'</span>';
  if(h.db_table) c+='<span>\\uD83D\\uDDC4 <code style="color:var(--green);font-size:10px;">'+esc(h.db_table)+'</code></span>';
  c+='</div>';
  c+='<div class="hub-offline">\\uD83D\\uDD12 Offline</div>';
  c+='<div class="hc-actions">';
  c+='<button class="btn-resume" onclick="resumeHub(\\''+hid+'\\',\\''+hname.replace(/'/g,"\\\\'")+'\\')" >\\u25B6 Resume</button>';
  c+='<button class="btn-delete-full" onclick="openDeleteModal(\\''+hid+'\\')" >\\u26A0 Delete</button>';
  c+='</div></div>';
  return c;

function filterHubs(){
  var q=(document.getElementById('hubSearchInput').value||'').toLowerCase();
  if(!q){renderHubManager(window._allHubs||[]);return;}
  var filtered=(window._allHubs||[]).filter(function(h){
    return (h.hub_name||'').toLowerCase().indexOf(q)>=0||(h.hub_id||'').toLowerCase().indexOf(q)>=0||(h.product_code||'').toLowerCase().indexOf(q)>=0||(h.bu||'').toLowerCase().indexOf(q)>=0||(h.owner||'').toLowerCase().indexOf(q)>=0;
  });
  renderHubManager(filtered);
}

function copyHubUrl(url){navigator.clipboard.writeText(url);toast('URL copied \\u2713','success');}

async function archiveHub(hubId,hubName){
  try{
    if(CONFIG.supabaseUrl&&CONFIG.supabaseAnonKey){
      var r=await fetch(CONFIG.supabaseUrl+'/rest/v1/roi_hub_registry?hub_id=eq.'+encodeURIComponent(hubId),
        {method:'PATCH',headers:{'apikey':CONFIG.supabaseAnonKey,'Authorization':'Bearer '+CONFIG.supabaseAnonKey,'Content-Type':'application/json','Prefer':'return=minimal'},
         body:JSON.stringify({status:'archived',updated_at:new Date().toISOString()})});
      if(!r.ok)throw new Error('Supabase PATCH HTTP '+r.status);
    }
    var local=JSON.parse(localStorage.getItem('roiHubRegistry')||'[]');
    var idx=local.findIndex(function(h){return h.hub_id===hubId;});
    if(idx>=0){local[idx].status='archived';localStorage.setItem('roiHubRegistry',JSON.stringify(local));}
    toast('"'+hubName+'" archived \\u2713','success');
    loadHubGrid();
  }catch(e){console.error('[HubMgr] Archive error:',e);toast('Archive failed: '+e.message,'error');}
}

async function resumeHub(hubId,hubName){
  try{
    if(CONFIG.supabaseUrl&&CONFIG.supabaseAnonKey){
      var r=await fetch(CONFIG.supabaseUrl+'/rest/v1/roi_hub_registry?hub_id=eq.'+encodeURIComponent(hubId),
        {method:'PATCH',headers:{'apikey':CONFIG.supabaseAnonKey,'Authorization':'Bearer '+CONFIG.supabaseAnonKey,'Content-Type':'application/json','Prefer':'return=minimal'},
         body:JSON.stringify({status:'live',updated_at:new Date().toISOString()})});
      if(!r.ok)throw new Error('Supabase PATCH HTTP '+r.status);
    }
    var local=JSON.parse(localStorage.getItem('roiHubRegistry')||'[]');
    var idx=local.findIndex(function(h){return h.hub_id===hubId;});
    if(idx>=0){local[idx].status='live';localStorage.setItem('roiHubRegistry',JSON.stringify(local));}
    toast('"'+hubName+'" resumed \\u2713','success');
    loadHubGrid();
  }catch(e){console.error('[HubMgr] Resume error:',e);toast('Resume failed: '+e.message,'error');}
}

var _pendingDeleteHubId=null;

function openDeleteModal(hubId){
  _pendingDeleteHubId=hubId;
  var hub=(window._allHubs||[]).find(function(h){return h.hub_id===hubId;});
  if(!hub){toast('Hub not found','error');return;}
  var body=document.getElementById('delModalBody');
  body.innerHTML='This will <strong>permanently delete</strong> all data for <strong>'+esc(hub.hub_name||hubId)+'</strong>:<br><br>'+
    '\\u2022 Supabase table: <code>'+(hub.db_table||'N/A')+'</code> (all rows deleted)<br>'+
    '\\u2022 GitHub repo: <code>'+(hub.hub_id||'')+'-roi-hub</code> (repository deleted)<br>'+
    '\\u2022 Registry entry removed from Supabase<br><br>'+
    '<span style="color:var(--red);">\\u26A0 This action cannot be undone.</span>';
  document.getElementById('delModal').classList.add('show');
}

function closeDeleteModal(){
  document.getElementById('delModal').classList.remove('show');
  _pendingDeleteHubId=null;
  var btn=document.getElementById('delConfirmBtn');
  btn.classList.remove('btn-disabled');
  btn.innerHTML='\\uD83D\\uDDD1\\uFE0F Delete Forever';
}

async function confirmDeleteHub(){
  if(!_pendingDeleteHubId)return;
  var hub=(window._allHubs||[]).find(function(h){return h.hub_id===_pendingDeleteHubId;});
  if(!hub){closeDeleteModal();return;}
  var btn=document.getElementById('delConfirmBtn');
  btn.classList.add('btn-disabled');btn.textContent='\\u23F3 Deleting\\u2026';
  var hubId=hub.hub_id;var hubName=hub.hub_name||hubId;
  console.log('[HubMgr] === Starting full delete for "'+hubName+'" ===');

  /* Step 1: Delete all rows from Supabase data table */
  if(hub.db_table&&CONFIG.supabaseUrl&&CONFIG.supabaseAnonKey){
    try{
      console.log('[HubMgr] Step 1: Deleting Supabase table rows from',hub.db_table);
      var r1=await fetch(CONFIG.supabaseUrl+'/rest/v1/'+hub.db_table+'?id=neq.',
        {method:'DELETE',headers:{'apikey':CONFIG.supabaseAnonKey,'Authorization':'Bearer '+CONFIG.supabaseAnonKey,'Prefer':'return=minimal'}});
      console.log('[HubMgr] Step 1 result:',r1.status,(r1.ok||r1.status===204)?'\\u2705 OK':'\\u274C FAIL');
    }catch(e){console.error('[HubMgr] Step 1 error:',e);}
  } else {console.warn('[HubMgr] Step 1 skipped (no db_table or config)');}

  /* Step 2: Delete GitHub repository */
  var repoName=hubId+'-roi-hub';
  if(CONFIG.githubToken&&CONFIG.githubUser){
    try{
      console.log('[HubMgr] Step 2: Deleting GitHub repo',CONFIG.githubUser+'/'+repoName);
      var r2=await fetch('https://api.github.com/repos/'+CONFIG.githubUser+'/'+repoName,
        {method:'DELETE',headers:{'Authorization':'Bearer '+CONFIG.githubToken,'Accept':'application/vnd.github+json'}});
      if(r2.ok||r2.status===204){console.log('[HubMgr] Step 2 \\u2705 Repo deleted');}
      else if(r2.status===404){console.log('[HubMgr] Step 2 \\u2705 Repo not found (already deleted)');}
      else{console.error('[HubMgr] Step 2 \\u274C HTTP',r2.status,await r2.text());}
    }catch(e){console.error('[HubMgr] Step 2 error:',e);}
  } else {console.warn('[HubMgr] Step 2 skipped (no GitHub token/user)');}

  /* Step 3: Delete registry entry from Supabase */
  if(CONFIG.supabaseUrl&&CONFIG.supabaseAnonKey){
    try{
      console.log('[HubMgr] Step 3: Deleting registry entry for',hubId);
      var r3=await fetch(CONFIG.supabaseUrl+'/rest/v1/roi_hub_registry?hub_id=eq.'+encodeURIComponent(hubId),
        {method:'DELETE',headers:{'apikey':CONFIG.supabaseAnonKey,'Authorization':'Bearer '+CONFIG.supabaseAnonKey,'Prefer':'return=minimal'}});
      console.log('[HubMgr] Step 3 result:',r3.status,(r3.ok||r3.status===204)?'\\u2705 OK':'\\u274C FAIL');
    }catch(e){console.error('[HubMgr] Step 3 error:',e);}
  }

  /* Step 4: Clean up localStorage */
  var local=JSON.parse(localStorage.getItem('roiHubRegistry')||'[]');
  local=local.filter(function(h){return h.hub_id!==hubId;});
  localStorage.setItem('roiHubRegistry',JSON.stringify(local));
  console.log('[HubMgr] Step 4 \\u2705 localStorage cleaned');

  closeDeleteModal();
  toast('"'+hubName+'" fully deleted from Supabase + GitHub \\u2713','success');
  console.log('[HubMgr] === Delete complete for "'+hubName+'" ===');
  loadHubGrid();
}

function updateHubCount(){
  var el=document.getElementById('hubCount');if(!el)return;
  var hubs=window._allHubs||JSON.parse(localStorage.getItem('roiHubRegistry')||'[]');
  var liveCount=hubs.filter(function(h){return (h.status||'live')==='live';}).length;
  el.textContent=String(liveCount);
}
